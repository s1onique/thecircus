server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    access_log /dev/stdout;
    error_log /dev/stderr warn;
    server_tokens off;

    # Browser-independent liveness probe.  It does not boot Elm or call the API.
    location = /healthz {
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        return 200 "ok\n";
    }

    # The entrypoint is deliberately not immutable: it is the cache boundary for
    # the static application and may reference a future asset set.
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # This is ready for hashed assets if the Elm bundling pipeline introduces
    # them.  The current app.js/styles.css are intentionally not immutable.
    location ~* "\.[0-9a-f]{8,}\.(?:js|css|map|svg|png|jpg|jpeg|gif|webp|woff2?)$" {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~* "\.(?:js|css|map|svg|png|jpg|jpeg|gif|webp|woff2?)$" {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Elm Browser.application routes fall back to the same entrypoint.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
